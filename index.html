<!doctype html>
<html>
  <head>
    <title>Habsieg's Lavnian Database</title>
    <style>
      body {
        display: grid;
        justify-content: center;
        align-items: center;
        font-family: Consolas, monospace;
        font-size: 12px;
        background-color: #050505;
        line-height: 5px;
      }
      h2 {
        color: #ffffff;
      }
      p {
        color: #ffffff;
      }

      .terminal {
        background-color: #0f0f0f;
        color: #ffffff;
        width: 600px;
        height: 400px;
        overflow-y: auto;
        padding: 5px 5px;
        border: 3px solid #1f1f1f;
        border-radius: 5px;
        font-family: Consolas, monospace;
      }

      .input-form {
        padding: 5px 0px
      }

      .not-important-info {
        color: #666666
      }

      input {
        border: 0px;
        outline: none;
        background-color: #0f0f15;
        color: #ffffff;
        width: 567px;
        padding: 5px 5px;
        border: 3px solid #1f1f35;
        border-radius: 5px;
        font-family: Consolas, monospace;
      }

      input:hover {
        background-color: #303045
      }
      input:enter {

      }

      label.input-label {
        background-color: #050505;
        color: #ffffff;
      }
      
      pre {
        line-height: 12px;
      }

      ::-webkit-scrollbar {
        width: 10px;
      }
      ::-webkit-scrollbar-track {
        background: #252525;
      }
      ::-webkit-scrollbar-thumb {
        background: #303030;
        border-radius: 5px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #ffffff;
      }
    </style>
  </head>
  <body>
    <h2 class="not-important-info">Lavnian Language Database Terminal</h2>
    <p class="not-important-info">est. since May 6th 2025</p>
    <div class="terminal">
      <pre class="output" name="output">
      </pre>
    </div>
    <div class="input-form">
      <label class="input-label">
      [] >
    </label>
    <input class="cmd" name="cmd" spellcheck="false">
    </div>
    <p class="not-important-info">Contact habsieg for help or in the case of bugs.</p>

    <script src="script.js"></script>

  </body>
</html>
